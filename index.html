<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=7">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/nav-bar.css">
  <script defer src="js/index.js"></script>
  <title>Revivel</title>
</head>
<body>
  <main>
    <header class="header-container">
      <h1 class="page-title">OLÁ, LUAN!</h1>
      <span class="open-progress-modal">
        <p class="today">1</p>
      </span>
    </header>

    <aside class="stats-container">
      <div class="total-stats stats">
        <p class="stats-title">Total</p>
        <p class="stats-data">0 / 0</p>
      </div>

      <div class="obg-stats stats">
        <p class="stats-title">Obrigatórios</p>
        <p class="stats-data">0 / 0</p>
      </div>
    </aside>

    <h1 class="rutine-title">ROTINA</h1>

    <section class="tasks-container">
      <div class="hr"></div>

      <div class="tasks"></div>
    </section>

    <dialog class="create-tasks-modal" open>
      <button class="close-ct-modal">X</button>

      <div class="inp-container">
        <label for="task-name-inp">Taréfa</label>
        <input type="text" name="task-inp" id="task-name-inp" placeholder="Nome">

        <label for="task-durantion">Duração</label>
        <select name="task-inp" id="task-durantion">
          <option value="1">1 hr</option>
          <option value="2">2 hr</option>
          <option value="3">3 hr</option>
          <option value="4">4 hr</option>
        </select>

        <label for="task-type">Tipo</label>
        <select name="task-inp" id="task-type">
          <option value="hab">Hábito</option>
          <option value="obj">Objetivo</option>
        </select>
      </div>

      <button class="create-task-btn">create</button>
    </dialog>

    <menu class="btns-container">
      <button class="open-btns-container">></button>
      <p>mostrar botões</p>
      <button class="open-ct-modal btns">+</button>
      <button class="remove-tasks-btn btns">-</button>
      <button class="edit-tasks-btn btns">!</button>
    </menu>
  </main>

  <nav class="nav-bar">
    <ul class="nav-list">
      <li><a href="#" class="goal-page page">goal</a></li>
      <li><a href="#" class="home-page page">home</a></li>
      <li><a href="#" class="user-page page">user</a></li>
    </ul>
  </nav>
</body>
</html>
